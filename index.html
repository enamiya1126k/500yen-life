<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500円ライフ</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

<div class="container">

    <h1>💰500円ライフ</h1>

    <div class="card">
        <h2>残高</h2>
        <div id="balance">0円</div>
    </div>

    <button id="dailyBtn">今日の500円を受け取る</button>
    <button id="salaryBtn">🎁25日ボーナス(+15000円)</button>

    <div class="card">
        <input type="number" id="expense" placeholder="使った金額">
        <button onclick="addExpense()">支出登録</button>
    </div>

    <div class="card">
        <h3>🎰ボーナスチャレンジ</h3>

<div class="slot-panel">

    <div>
        BET
        <span id="betDisplay">5</span>
    </div>

    <div>
        PAY
        <span id="payoutDisplay">0</span>
    </div>

</div>

        <div id="gogoLamp" class="gogo-lamp">GOGO!</div>

        <p id="maxBetText">最大賭け金：0円</p>

        <input type="number" id="betAmount" placeholder="賭け金" value="5">

        <div class="bet-buttons">
            <button onclick="setBet(5)">5円</button>
            <button onclick="setBet(10)">10円</button>
            <button onclick="setBet(50)">50円</button>
            <button onclick="setMaxBet()">MAX</button>
        </div>

        <button onclick="playSlot()">スロットを回す</button>

        <div class="slot-machine">
            <div class="slot-cell" id="cell0">🎰</div>
            <div class="slot-cell" id="cell1">🎰</div>
            <div class="slot-cell" id="cell2">🎰</div>

            <div class="slot-cell" id="cell3">🎰</div>
            <div class="slot-cell" id="cell4">🎰</div>
            <div class="slot-cell" id="cell5">🎰</div>

            <div class="slot-cell" id="cell6">🎰</div>
            <div class="slot-cell" id="cell7">🎰</div>
            <div class="slot-cell" id="cell8">🎰</div>
            
            <div class="diagonal-left"></div>
<div class="diagonal-right"></div>
            
        </div>

<div class="stop-buttons">
    <button type="button" onclick="stopReel(0)">STOP</button>
    <button type="button" onclick="stopReel(1)">STOP</button>
    <button type="button" onclick="stopReel(2)">STOP</button>
</div>

        <p id="slotMessage"></p>
    </div>

    <div class="card">
        <h3>生活履歴</h3>
        <button onclick="resetHistory()">生活履歴をリセット</button>
        <ul id="history"></ul>
    </div>

    <div class="card">
        <h3>🎰ボーナスチャレンジ履歴</h3>
        <button onclick="resetSlotHistory()">スロット履歴をリセット</button>
        <ul id="slotHistory"></ul>
    </div>

</div>

<script src="script.js?v=4"></script>

</body>
</html>
